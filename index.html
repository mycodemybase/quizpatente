<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Load 1.xlsx from Same Folder</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 5px; text-align: left; }
        th { background-color: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Excel Data from 1.xlsx</h1>

    <!-- File input to select 1.xlsx -->
    <input type="file" id="fileInput" accept=".xlsx,.xls" />

    <table id="excelTable"></table>

    <!-- SheetJS library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script>
        document.getElementById('fileInput').addEventListener('change', handleFile, false);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });

                // Merge all sheets into one array
                let mergedData = [];
                workbook.SheetNames.forEach(sheetName => {
                    const sheet = workbook.Sheets[sheetName];
                    const sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    // Add sheet name as first column
                    sheetData.forEach(row => row.unshift(sheetName));
                    mergedData = mergedData.concat(sheetData);
                });

                displayData(mergedData);
            };
            reader.readAsArrayBuffer(file);
        }

        function displayData(data) {
            const table = document.getElementById('excelTable');
            table.innerHTML = "";

            // Optional header row
            if (data.length > 0) {
                const headerRow = document.createElement('tr');
                data[0].forEach((cell, idx) => {
                    const th = document.createElement('th');
                    th.textContent = idx === 0 ? 'Sheet' : cell;
                    headerRow.appendChild(th);
                });
                table.appendChild(headerRow);
                data = data.slice(1); // remove header row from data
            }

            // Add data rows
            data.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell !== undefined ? cell : '';
                    tr.appendChild(td);
                });
                table.appendChild(tr);
            });
        }
    </script>
</body>
</html>
