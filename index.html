<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Carica 1.xlsx dalla repo</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        td, th { border: 1px solid #ccc; padding: 5px; text-align: left; }
        th { background-color: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Dati da 1.xlsx</h1>
    <table id="excelTable"></table>

    <!-- SheetJS library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script>
        // File Excel nella stessa cartella della pagina HTML
        const excelFile = "1.xlsx";

        fetch(excelFile)
            .then(response => {
                if (!response.ok) throw new Error("Impossibile caricare il file Excel");
                return response.arrayBuffer();
            })
            .then(data => {
                const workbook = XLSX.read(data, { type: "array" });

                let mergedData = [];
                workbook.SheetNames.forEach(sheetName => {
                    const sheet = workbook.Sheets[sheetName];
                    const sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    sheetData.forEach(row => row.unshift(sheetName)); // aggiungi nome sheet
                    mergedData = mergedData.concat(sheetData);
                });

                displayData(mergedData);
            })
            .catch(err => console.error("Errore caricamento Excel:", err));

        function displayData(data) {
            const table = document.getElementById("excelTable");
            table.innerHTML = "";

            if (data.length > 0) {
                // header
                const headerRow = document.createElement("tr");
                data[0].forEach((cell, idx) => {
                    const th = document.createElement("th");
                    th.textContent = idx === 0 ? "Sheet" : cell;
                    headerRow.appendChild(th);
                });
                table.appendChild(headerRow);
                data = data.slice(1);
            }

            // dati
            data.forEach(row => {
                const tr = document.createElement("tr");
                row.forEach(cell => {
                    const td = document.createElement("td");
                    td.textContent = cell !== undefined ? cell : "";
                    tr.appendChild(td);
                });
                table.appendChild(tr);
            });
        }
    </script>
</body>
</html>
